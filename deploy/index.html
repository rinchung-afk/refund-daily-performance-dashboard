<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>당일 성과 확인 대시보드</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d8e1ea;
      --soft-line: #eef3f8;
      --navy: #003b73;
      --blue: #006dff;
      --blue-soft: #eaf3ff;
      --green: #00a86b;
      --green-soft: #ecfdf3;
      --red: #f04438;
      --red-soft: #fee2e2;
      --amber: #ffb000;
      --amber-soft: #fff8e6;
      --teal: #00a3b5;
      --orange: #ff7a00;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    header {
      z-index: 10;
      background: linear-gradient(180deg, #eef5fb 0%, #f7fafc 100%);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 24px 22px;
    }

    .report-kicker {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--navy);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .hero-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      margin-top: 14px;
    }

    .hero-copy {
      max-width: 920px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 8px;
      min-width: 360px;
    }

    .meta-chip {
      border: 1px solid #cdd8e5;
      border-radius: 8px;
      background: rgba(255,255,255,0.76);
      padding: 9px 10px;
    }

    .meta-chip span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }

    .meta-chip strong {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    h1 { margin: 0; font-size: 34px; letter-spacing: 0; line-height: 1.12; }
    h2 { margin: 0 0 12px; font-size: 16px; letter-spacing: 0; }
    .section-heading {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin: 24px 0 12px;
      color: var(--navy);
    }

    .section-heading .num {
      color: var(--blue);
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .section-heading .eyebrow {
      margin: 0 0 2px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }
    .subtle { color: var(--muted); }

    input {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      min-width: 220px;
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 20px 24px 42px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .kpi, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .kpi {
      position: relative;
      overflow: hidden;
      padding: 14px 14px 13px;
      min-height: 104px;
      border-top: 5px solid #006dff;
      background: linear-gradient(180deg, #ffffff 0%, #f5f9ff 100%);
    }

    .kpi.blue { border-top-color: var(--blue); background: linear-gradient(180deg, #ffffff 0%, #e9f3ff 100%); }
    .kpi.green { border-top-color: var(--green); background: linear-gradient(180deg, #ffffff 0%, #e8fff4 100%); }
    .kpi.amber { border-top-color: var(--amber); background: linear-gradient(180deg, #ffffff 0%, #fff4cf 100%); }
    .kpi.navy { border-top-color: var(--navy); background: linear-gradient(180deg, #ffffff 0%, #e9f4ff 100%); }

    .kpi-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .kpi-index {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 900;
    }

    .kpi .value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .kpi .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    section { padding: 16px; }

    .summary-panel {
      margin-bottom: 16px;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 12px;
    }

    .insight-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      min-height: 116px;
    }

    .insight-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--navy);
      font-size: 13px;
    }

    .insight-card div {
      color: #334155;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .chart-card {
      padding: 0;
      overflow: hidden;
    }

    .chart-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      padding: 15px 16px 8px;
      border-bottom: 1px solid var(--soft-line);
    }

    .chart-kicker {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
    }

    .chart-top h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      color: var(--navy);
    }

    .chart-note {
      margin: 0 16px 14px;
      padding: 10px 11px;
      border: 1px solid var(--soft-line);
      border-radius: 7px;
      background: #f8fbfd;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
    }

    .chart {
      width: 100%;
      min-height: 320px;
      display: block;
      padding: 4px 6px 0;
    }

    .segmented, .tabs, .subtabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .basis-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 0 0 18px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .basis-tabs span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-right: 4px;
    }

    .segmented { margin: 0 0 10px; }
    .tabs { margin: 18px 0 12px; }
    .subtabs { margin: 0 0 12px; }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .tabs button, .subtabs button, .segmented button {
      background: #f8fafc;
      border-color: #dbe4ee;
      color: #334155;
      font-size: 12px;
      padding: 7px 10px;
    }

    button.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    .notes {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
    }

    .notes-title {
      margin: 24px 0 8px;
      font-size: 15px;
      font-weight: 800;
      color: var(--navy);
    }

    .campaign-comment {
      margin: 0 0 12px;
      padding: 12px 13px;
      border: 1px solid #cfd9e6;
      border-radius: 6px;
      background: #f8fbfd;
      color: #334155;
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 640px;
      border: 1px solid #cfd9e6;
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1360px;
      table-layout: auto;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid #edf1f5;
      text-align: right;
      white-space: nowrap;
      line-height: 1.25;
      font-size: 12px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f1f6fb;
      color: #243b53;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid #cfd9e6;
      box-shadow: inset 0 -1px 0 #cfd9e6;
    }

    th.sort-col, td.sort-col { font-weight: 800; }

    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3) {
      text-align: left;
    }

    tbody tr:nth-child(even) { background: #fcfdff; }
    tbody tr:hover { background: #f3f8fd; }
    tr.today-row td { background: #eaf3ff; }
    tr.best-row { background: #ecfdf3; }
    tr.below-row { background: #fee2e2; }
    tr.action-scale td { background: #ecfdf3; }
    tr.action-pause td { background: #fee2e2; }
    tr.action-refresh td { background: #fff1f2; }
    tr.action-conversion td { background: #fffbeb; }
    tr.risk-critical { background: #fee2e2; }
    tr.risk-high { background: #fff1f2; }
    tr.risk-medium { background: #fffbeb; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--muted); }

    @media (max-width: 1180px) {
      .kpis { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
      .insight-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
      .grid { grid-template-columns: 1fr; }
      .hero-row { grid-template-columns: 1fr; }
      .meta-grid { min-width: 0; }
    }

    @media (max-width: 680px) {
      main, .topbar { padding-left: 14px; padding-right: 14px; }
      h1 { font-size: 28px; }
      .kpis { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
      .insight-grid { grid-template-columns: 1fr; }
      input { width: 100%; min-width: 0; }
    }
  </style>
</head>

    const colors = { '합계':'#17324d', 'facebook.business':'#3366FF', 'google_demandgen':'#CC0000', 'google_pmax':'#CC0000', 'kakao':'#FFC000', 'tiktok':'#9900CC' };

    function activeData() {
      return (DATA.conversion_data && DATA.conversion_data[state.conversionView]) || DATA;
    }

    function activeViewLabel() {
      const view = (DATA.metadata.conversion_views || []).find(item => item.key === state.conversionView);
      return view ? view.label : 'DB 기준';
    }

    function detailTabs() {
      const unmatchedLabel = state.conversionView === 'airbridge' ? 'Unmatched Airbridge' : 'Unmatched DB';
      const channelSources = ['facebook.business', 'kakao', 'tiktok'].filter(source => DATA.metadata.media_sources.includes(source));
      return [
        ['source_summary', 'Summary'],
        ...channelSources.slice(0, 1).map(source => [`source:${source}`, source]),
        ['google', 'Google'],
        ...channelSources.slice(1).map(source => [`source:${source}`, source]),
        ['unmatched_media_content', 'Unmatched Media'],
        ['unmatched_db_content', unmatchedLabel],
        ['action_guide', 'Action Guide']
      ];
    }

    function n(value) { return Number(value || 0); }
    function fmt(value, key) {
      if (value === null || value === undefined || value === '') return '-';
      if (key === 'roas') return `${Math.round(n(value) * 100).toLocaleString('ko-KR')}%`;
      if (pct.has(key)) return `${(n(value) * 100).toFixed(1)}%`;
      if (money.has(key)) return `₩${Math.round(n(value)).toLocaleString('ko-KR')}`;
      if (numeric.has(key)) return Math.round(n(value)).toLocaleString('ko-KR');
      if (typeof value === 'number') return value.toLocaleString('ko-KR');
      return String(value);
    }
    function deltaClass(value) {
      if (value === null || value === undefined) return 'flat';
      return n(value) > 0 ? 'up' : n(value) < 0 ? 'down' : 'flat';
    }
    function colClass(col) {
      const classes = [];
      if (state.sortKey === col) classes.push('sort-col');
      return classes.join(' ');
    }
    function headerText(col) {
      const arrow = state.sortKey === col ? (state.sortDir === -1 ? ' ▼' : ' ▲') : '';
      return `${labels[col] || col}${arrow}`;
    }
    function sumRows(rows) {
      return rows.reduce((acc, row) => {
        for (const key of ['spend','impressions','clicks','lookups','applications','application_amount','expected_payment']) acc[key] += n(row[key]);
        return acc;
      }, { spend:0, impressions:0, clicks:0, lookups:0, applications:0, application_amount:0, expected_payment:0 });
    }
    function derive(row) {
      return {
        ...row,
        cpm: row.impressions ? row.spend * 1000 / row.impressions : null,
        ctr: row.impressions ? row.clicks / row.impressions : null,
        cpc: row.clicks ? row.spend / row.clicks : null,
        lookup_rate: row.clicks ? row.lookups / row.clicks : null,
        lookup_cac: row.lookups ? row.spend / row.lookups : null,
        application_rate: row.lookups ? row.applications / row.lookups : null,
        application_cac: row.applications ? row.spend / row.applications : null,
        refund_per_application: row.applications ? row.application_amount / row.applications : null,
        roas: row.spend ? row.expected_payment / row.spend : null,
      };
    }

    function totalSourceRow() {
      return { source: '합계', ...derive(sumRows(activeData().source_summary)) };
    }

    function dailyRowsForSource(source) {
      const dailyData = activeData().source_recent_14_daily || activeData().source_month_daily;
      const rows = dailyData.filter(item => source === '합계' || item.source === source);
      if (source !== '합계') return rows.sort((a, b) => String(b.date).localeCompare(String(a.date)));
      const byDate = new Map();
      rows.forEach(row => {
        const date = row.date.slice(0, 10);
        if (!byDate.has(date)) byDate.set(date, { date, source: '합계', spend:0, impressions:0, clicks:0, lookups:0, applications:0, application_amount:0, expected_payment:0 });
        const target = byDate.get(date);
        for (const key of ['spend','impressions','clicks','lookups','applications','application_amount','expected_payment']) target[key] += n(row[key]);
      });
      return Array.from(byDate.values()).map(derive).sort((a, b) => String(b.date).localeCompare(String(a.date)));
    }

    function sourceRiskRows() {
      const severityRank = { '긴급': 5, '높음': 4, '주의': 3, '안정': 2, '개선': 1 };
      return activeData().today_source_summary.map(row => {
        const delta = n(row.lookup_cac_vs_avg_7d);
        let severity = '안정';
        let riskType = '효율 유지';
        let note = `최근 7일 평균 대비 조회CAC 변동 ${fmt(delta, 'lookup_cac_vs_avg_7d')}`;
        if (delta >= 0.5) {
          severity = '긴급';
          riskType = '효율 급락';
          note = `조회CAC가 최근 7일 평균 대비 ${fmt(delta, 'lookup_cac_vs_avg_7d')} 상승했습니다. source 단위 원인 확인이 필요합니다.`;
        } else if (delta >= 0.25) {
          severity = '높음';
          riskType = '효율 악화';
          note = `조회CAC가 최근 7일 평균 대비 ${fmt(delta, 'lookup_cac_vs_avg_7d')} 상승했습니다. campaign/content 원인 탐색이 필요합니다.`;
        } else if (delta >= 0.15) {
          severity = '주의';
          riskType = '효율 주의';
          note = `조회CAC가 최근 7일 평균 대비 ${fmt(delta, 'lookup_cac_vs_avg_7d')} 상승했습니다. 추이를 모니터링하세요.`;
        } else if (delta <= -0.15) {
          severity = '개선';
          riskType = '효율 개선';
          note = `조회CAC가 최근 7일 평균 대비 ${fmt(delta, 'lookup_cac_vs_avg_7d')} 개선됐습니다.`;
        }
        return {
          ...row,
          severity,
          risk_type: riskType,
          note,
          risk_priority: (severityRank[severity] || 0) * 1000000000000 + n(row.spend)
        };
      }).sort((a, b) => n(b.risk_priority) - n(a.risk_priority));
    }

    function campaignContentRisk(source, campaign) {
      const rows = contentRowsForCampaign(source, campaign).filter(row => n(row.spend) > 0);
      const totalSpend = rows.reduce((sum, row) => sum + n(row.spend), 0);
      const totalLookups = rows.reduce((sum, row) => sum + n(row.lookups), 0);
      const avgLookupCac = totalLookups ? totalSpend / totalLookups : 0;
      const zeroRows = rows.filter(row => n(row.lookups) === 0).sort((a, b) => n(b.spend) - n(a.spend));
      const highCacRows = rows
        .filter(row => avgLookupCac && n(row.lookups) > 0 && n(row.lookup_cac) >= avgLookupCac * 1.5)
        .sort((a, b) => n(b.lookup_cac) - n(a.lookup_cac));
      return {
        avgLookupCac,
        zeroRows,
        highCacRows,
        riskScore: zeroRows.length * 1000000000 + highCacRows.length * 1000000 + rows.reduce((sum, row) => sum + n(row.spend), 0)
      };
    }

    function campaignContentRiskSummaries() {
      return activeData().campaign_breakdown_today
        .filter(row => n(row.spend) > 0)
        .map(row => {
          const risk = campaignContentRisk(row.source, row.campaign);
          return { ...row, ...risk };
        })
        .filter(row => row.zeroRows.length || row.highCacRows.length)
        .sort((a, b) => n(b.riskScore) - n(a.riskScore));
    }

    function renderKeySummary() {
      const sourceRisks = sourceRiskRows();
      const urgentSources = sourceRisks.filter(row => ['긴급','높음','주의'].includes(row.severity));
      const improvedSources = sourceRisks.filter(row => row.severity === '개선');
      const campaignRisks = campaignContentRiskSummaries();
      const topCampaignRisks = campaignRisks.slice(0, 2).map(row =>
        `${row.source} / ${row.campaign}: 조회 없음 ${row.zeroRows.length}개, 조회CAC 높음 ${row.highCacRows.length}개`
      ).join('<br>');

      const cards = [
        ['source 점검', urgentSources[0]
          ? `${urgentSources[0].source} 효율 risk가 가장 큽니다. 최근 7일 대비 조회CAC ${fmt(urgentSources[0].lookup_cac_vs_avg_7d, 'lookup_cac_vs_avg_7d')}, 금일 조회CAC ${fmt(urgentSources[0].lookup_cac, 'lookup_cac')}입니다.`
          : (improvedSources[0]
            ? `현재 source 효율 급락은 없습니다. ${improvedSources[0].source}는 최근 7일 대비 조회CAC가 ${fmt(improvedSources[0].lookup_cac_vs_avg_7d, 'lookup_cac_vs_avg_7d')} 개선됐습니다.`
            : '현재 source 효율은 최근 7일 대비 큰 이상 없이 유지 중입니다.')],
        ['campaign 점검', campaignRisks.length
          ? `content 점검이 시급한 campaign은 ${campaignRisks.length}개입니다.<br>${topCampaignRisks}`
          : 'content 단위에서 즉시 점검이 필요한 campaign은 없습니다.']
      ];

      document.getElementById('keySummary').innerHTML = cards.map(([title, text]) => `
        <div class="insight-card">
          <strong>${title}</strong>
          <div>${text}</div>
        </div>`).join('');
    }

    function renderKpis() {
      const total = derive(sumRows(activeData().today_source_summary));
      const items = [
        ['01', '조회율', fmt(total.lookup_rate, 'lookup_rate'), '조회 / 클릭', 'navy'],
        ['02', '조회CAC', fmt(total.lookup_cac, 'lookup_cac'), '광고비 / 조회', 'blue'],
        ['03', '신청율', fmt(total.application_rate, 'application_rate'), '신청 / 조회', 'green'],
        ['04', '신청CAC', fmt(total.application_cac, 'application_cac'), '광고비 / 신청', 'amber'],
        ['05', 'ROAS', fmt(total.roas, 'roas'), '예상결제액 / 광고비', 'green'],
      ];
      document.getElementById('kpiGrid').innerHTML = items.map(([index, label, value, hint, accent]) => `
        <div class="kpi ${accent}">
          <div class="kpi-head">
            <div class="label">${label}</div>
            <div class="kpi-index">${index}</div>
          </div>
          <div class="value">${value}</div>
          <div class="hint">${hint}</div>
        </div>`).join('');
    }

    function renderCompareChart() {
      const svg = document.getElementById('compareChart');
      const rows = activeData().lookup_cac_compare_7d;
      const values = rows.flatMap(row => [n(row.lookup_cac), n(row.avg_lookup_cac_7d)]);
      const max = Math.max(1, ...values) * 1.18;
      const width = 760, height = 340, pad = 54;
      const band = (width - pad * 2) / Math.max(rows.length, 1);
      let out = `<rect width="${width}" height="${height}" fill="#fff"/>`;
      for (let i = 0; i <= 4; i++) {
        const y = pad + i * ((height - pad * 2) / 4);
        out += `<line x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}" stroke="#eef3f8"/>`;
      }
      out += `<line x1="${pad}" y1="${height-pad}" x2="${width-pad}" y2="${height-pad}" stroke="#cfd9e6"/>`;
      let worst = null;
      rows.forEach((row, i) => {
        const x = pad + i * band + band * 0.16;
        const hToday = n(row.lookup_cac) / max * (height - pad * 2);
        const hAvg = n(row.avg_lookup_cac_7d) / max * (height - pad * 2);
        const delta = row.avg_lookup_cac_7d ? n(row.lookup_cac) / n(row.avg_lookup_cac_7d) - 1 : 0;
        const todayColor = delta > 0 ? '#c2413a' : '#16845b';
        if (!worst || delta > worst.delta) worst = { ...row, delta };
        out += `<rect x="${x}" y="${height-pad-hToday}" width="${band*0.24}" height="${hToday}" fill="${todayColor}" rx="4"/>`;
        out += `<rect x="${x + band*0.3}" y="${height-pad-hAvg}" width="${band*0.24}" height="${hAvg}" fill="#cbd5e1" rx="4"/>`;
        out += `<text x="${x - 4}" y="${height-pad-hToday-8}" font-size="11" font-weight="700" fill="${todayColor}">${fmt(row.lookup_cac, 'lookup_cac')}</text>`;
        out += `<text x="${x + band*0.24}" y="${height-pad-hAvg-8}" font-size="11" fill="#64748b">${fmt(row.avg_lookup_cac_7d, 'avg_lookup_cac_7d')}</text>`;
        out += `<text x="${x - 2}" y="${height-18}" font-size="12" font-weight="700" fill="#475467">${row.source}</text>`;
      });
      out += `<circle cx="${pad}" cy="22" r="5" fill="#16845b"/><text x="${pad+10}" y="26" font-size="12" fill="#334155">금일 개선</text>`;
      out += `<circle cx="${pad+86}" cy="22" r="5" fill="#c2413a"/><text x="${pad+96}" y="26" font-size="12" fill="#334155">금일 악화</text>`;
      out += `<circle cx="${pad+172}" cy="22" r="5" fill="#cbd5e1"/><text x="${pad+182}" y="26" font-size="12" fill="#334155">최근 7일 평균</text>`;
      svg.innerHTML = out;
      document.getElementById('compareNote').textContent = worst && worst.delta > 0
        ? `${worst.source} 조회CAC가 최근 7일 평균 대비 ${fmt(worst.delta, 'lookup_cac_vs_avg_7d')} 높습니다.`
        : '모든 source의 금일 조회CAC가 최근 7일 평균 대비 안정적입니다.';
    }

    function renderTrendButtons() {
      const sources = ['합계', ...DATA.metadata.media_sources];
      document.getElementById('trendButtons').innerHTML = sources.map(source =>
        `<button class="${state.trendSource === source ? 'active' : ''}" data-trend="${source}">${source}</button>`
      ).join('');
    }

    function renderTrendChart() {
      renderTrendButtons();
      const svg = document.getElementById('trendChart');
      const rows = activeData().lookup_cac_trend_14d.filter(row => row.source === state.trendSource);
      const dates = rows.map(row => row.date.slice(5, 10));
      const maxSpend = Math.max(1, ...rows.map(row => n(row.spend))) * 1.18;
      const maxCac = Math.max(1, ...rows.map(row => n(row.lookup_cac))) * 1.24;
      const width = 760, height = 340, pad = 54;
      const xFor = i => pad + i * ((width - pad * 2) / Math.max(rows.length - 1, 1));
      const ySpend = v => height - pad - n(v) / maxSpend * (height - pad * 2);
      const yCac = v => height - pad - n(v) / maxCac * (height - pad * 2);
      const barWidth = Math.max(8, (width - pad * 2) / Math.max(rows.length, 1) * 0.42);
      let out = `<rect width="${width}" height="${height}" fill="#fff"/>`;
      for (let i = 0; i <= 4; i++) {
        const y = pad + i * ((height - pad * 2) / 4);
        out += `<line x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}" stroke="#eef3f8"/>`;
      }
      out += `<line x1="${pad}" y1="${height-pad}" x2="${width-pad}" y2="${height-pad}" stroke="#cfd9e6"/>`;
      rows.forEach((row, i) => {
        const x = xFor(i);
        const h = height - pad - ySpend(row.spend);
        out += `<rect x="${x - barWidth / 2}" y="${height - pad - h}" width="${barWidth}" height="${h}" fill="#dbeafe" rx="4"/>`;
      });
      const points = rows.map((row, i) => `${xFor(i)},${yCac(row.lookup_cac)}`).join(' ');
      out += `<polyline points="${points}" fill="none" stroke="${colors[state.trendSource] || '#17324d'}" stroke-width="3"/>`;
      rows.forEach((row, i) => {
        const x = xFor(i), y = yCac(row.lookup_cac);
        out += `<circle cx="${x}" cy="${y}" r="4" fill="#fff" stroke="${colors[state.trendSource] || '#17324d'}" stroke-width="2"/>`;
        out += `<text x="${x - 26}" y="${y - 10}" font-size="10" font-weight="700" fill="#334155">${fmt(row.lookup_cac, 'lookup_cac')}</text>`;
        if (i === 0 || i === rows.length - 1 || i % 3 === 0) out += `<text x="${x - 18}" y="${height-18}" font-size="11" font-weight="700" fill="#667085">${dates[i]}</text>`;
      });
      out += `<rect x="${pad}" y="17" width="10" height="10" fill="#dbeafe" rx="2"/><text x="${pad+15}" y="27" font-size="12" fill="#334155">광고비</text>`;
      out += `<line x1="${pad+70}" y1="22" x2="${pad+90}" y2="22" stroke="${colors[state.trendSource] || '#17324d'}" stroke-width="3"/><text x="${pad+96}" y="27" font-size="12" fill="#334155">조회CAC</text>`;
      svg.innerHTML = out;
      const latest = rows[rows.length - 1];
      const previous = rows[rows.length - 2];
      const delta = latest && previous && previous.lookup_cac ? n(latest.lookup_cac) / n(previous.lookup_cac) - 1 : null;
      document.getElementById('trendNote').textContent = latest
        ? `${state.trendSource} 최근 일자 조회CAC는 ${fmt(latest.lookup_cac, 'lookup_cac')}${delta === null ? '' : `, 전일 대비 ${fmt(delta, 'lookup_cac_vs_avg_7d')}`}입니다.`
        : '선택한 source의 최근 14일 추이 데이터가 없습니다.';
    }

    function campaignsForSource(source) {
      return activeData().campaign_breakdown_today
        .filter(row => row.source === source && n(row.spend) > 0)
        .sort((a, b) => n(b.lookups) - n(a.lookups));
    }

    function contentRowsForCampaign(source, campaign) {
      return activeData().content_breakdown_today
        .filter(row => row.source === source && row.campaign === campaign && n(row.impressions) > 0);
    }

    function campaignLookupCacMap() {
      const stats = new Map();
      activeData().content_breakdown_today
        .filter(row => n(row.impressions) > 0 && n(row.spend) > 0)
        .forEach(row => {
          const key = `${row.source}||${row.campaign}`;
          if (!stats.has(key)) stats.set(key, { spend: 0, lookups: 0 });
          const item = stats.get(key);
          item.spend += n(row.spend);
          item.lookups += n(row.lookups);
        });
      return stats;
    }

    function classifyContentAction(row, campaignStats) {
      const key = `${row.source}||${row.campaign}`;
      const campaign = campaignStats.get(key) || { spend: 0, lookups: 0 };
      const campaignLookupCac = campaign.lookups ? campaign.spend / campaign.lookups : 0;
      const lookupShare = campaign.lookups ? n(row.lookups) / campaign.lookups : 0;
      let action = '관찰';
      let actionKey = 'watch';
      let priority = 100;

      if (n(row.lookups) === 0) {
        action = '중단 검토';
        actionKey = 'pause';
        priority = 500;
      } else if (campaignLookupCac && n(row.lookup_cac) >= campaignLookupCac * 1.5) {
        action = '교체 검토';
        actionKey = 'refresh';
        priority = 420;
      } else if (n(row.lookups) >= 3 && n(row.applications) === 0) {
        action = '신청 전환 점검';
        actionKey = 'conversion';
        priority = 360;
      } else if (campaignLookupCac && n(row.lookups) >= 3 && n(row.lookup_cac) > 0 && n(row.lookup_cac) <= campaignLookupCac * 0.8 && n(row.applications) > 0) {
        action = '확대 후보';
        actionKey = 'scale';
        priority = 300;
      }

      return {
        ...row,
        action,
        action_key: actionKey,
        campaign_lookup_cac: campaignLookupCac || null,
        lookup_share: lookupShare,
        action_priority: priority * 1000000000000 + n(row.spend)
      };
    }

    function actionGuideRows() {
      return [
        { action: '중단 검토', criteria: '노출 > 0, 광고비 > 0, 조회 = 0', note: '매체 집행은 있으나 Airbridge 조회 전환이 없는 content입니다.' },
        { action: '교체 검토', criteria: '조회 > 0, content 조회CAC >= campaign 평균 조회CAC * 1.5', note: '같은 campaign 평균 대비 조회 확보 비용이 높은 content입니다.' },
        { action: '신청 전환 점검', criteria: '조회 >= 3, 신청 = 0', note: '조회는 발생했지만 신청 전환이 없는 content입니다.' },
        { action: '확대 후보', criteria: '조회 >= 3, 신청 > 0, content 조회CAC <= campaign 평균 조회CAC * 0.8', note: 'campaign 평균보다 조회CAC가 낮고 신청도 발생한 content입니다.' },
        { action: '관찰', criteria: '위 조건에 해당하지 않는 content', note: '즉시 액션보다 데이터 누적 후 판단하는 항목입니다.' }
      ];
    }

    function googleSegment(source) {
      if (source === 'google_pmax') return 'PMax';
      if (source === 'google_demandgen') return 'Demand Gen';
      return 'Google';
    }

    function googleAnalysisRows() {
      const googleSources = new Set(['google_demandgen', 'google_pmax']);
      const rows = [];
      activeData().today_source_summary
        .filter(row => googleSources.has(row.source))
        .forEach(row => rows.push({
          ...row,
          google_segment: googleSegment(row.source),
          row_type: 'Source Total',
          campaign: '전체',
          content: '-',
          row_priority: 3000000000000 + n(row.spend)
        }));
      activeData().campaign_breakdown_today
        .filter(row => googleSources.has(row.source) && n(row.spend) > 0)
        .forEach(row => rows.push({
          ...row,
          google_segment: googleSegment(row.source),
          row_type: 'Campaign',
          content: 'Campaign Total',
          row_priority: 2000000000000 + n(row.spend)
        }));
      activeData().content_breakdown_today
        .filter(row => googleSources.has(row.source) && n(row.impressions) > 0 && n(row.spend) > 0)
        .forEach(row => rows.push({
          ...row,
          google_segment: googleSegment(row.source),
          row_type: 'Content',
          row_priority: 1000000000000 + n(row.spend)
        }));
      return rows.sort((a, b) => n(b.row_priority) - n(a.row_priority));
    }

    function googleSummaryRows() {
      const googleSources = new Set(['google_demandgen', 'google_pmax']);
      return activeData().today_source_summary
        .filter(row => googleSources.has(row.source))
        .map(row => ({
          ...row,
          google_segment: googleSegment(row.source),
          row_type: 'Source Total'
        }))
        .sort((a, b) => n(b.spend) - n(a.spend));
    }

    function googleContentRows(source) {
      const campaignStats = campaignLookupCacMap();
      return activeData().content_breakdown_today
        .filter(row => row.source === source && n(row.impressions) > 0 && n(row.spend) > 0)
        .map(row => classifyContentAction(row, campaignStats))
        .sort((a, b) => n(b.lookups) - n(a.lookups));
    }

    function googleActionRows() {
      return ['google_pmax', 'google_demandgen']
        .flatMap(source => googleContentRows(source))
        .filter(row => row.action_key !== 'watch')
        .sort((a, b) => n(b.action_priority) - n(a.action_priority));
    }

    function currentTableConfig() {
      if (state.tab === 'source_summary') {
        if (state.summaryView === 'source_risk') {
          return {
            rows: sourceRiskRows(),
            cols: ['severity','risk_type','source','spend','lookups','lookup_cac','avg_lookup_cac_7d','lookup_cac_vs_avg_7d','application_rate','roas','note'],
            defaultSort: 'risk_priority',
            sourceRisk: true
          };
        }
        return {
          rows: [totalSourceRow(), ...activeData().source_summary],
          expandable: true,
          cols: ['source', ...metricCols]
        };
      }
      if (state.tab === 'action_guide') {
        return {
          rows: actionGuideRows(),
          cols: ['action','criteria','note'],
          defaultSort: 'action'
        };
      }
      if (state.tab === 'google') {
        if (state.googleView.startsWith('campaign:')) {
          const [, source, campaign] = state.googleView.split(':');
          const campaignStats = campaignLookupCacMap();
          const detailCol = source === 'google_pmax' ? 'term' : 'content';
          return {
            rows: contentRowsForCampaign(source, campaign).map(row => {
              const actionRow = classifyContentAction(row, campaignStats);
              return { ...actionRow, term: actionRow.content };
            }),
            cols: ['action', detailCol, ...metricCols],
            defaultSort: 'lookups',
            highlightContent: true,
            source,
            campaign
          };
        }
        return {
          rows: googleSummaryRows(),
          cols: ['source', ...metricCols],
          defaultSort: 'spend'
        };
      }
      if (state.tab === 'unmatched_media_content') {
        return { rows: activeData().unmatched_media_content, cols: ['source','campaign','content', ...metricCols] };
      }
      if (state.tab === 'unmatched_db_content') {
        return { rows: activeData().unmatched_conversion_content || activeData().unmatched_db_content, cols: ['source','campaign','content', ...metricCols] };
      }
      const source = state.tab.replace('source:', '');
      const campaigns = campaignsForSource(source);
      if (!state.activeCampaign[source]) state.activeCampaign[source] = '__total';
      const campaign = state.activeCampaign[source];
      if (campaign === '__total') {
        const rows = activeData().campaign_breakdown_today.filter(row => row.source === source && n(row.spend) > 0);
        return { rows, cols: ['campaign', ...metricCols] };
      }
      const campaignStats = campaignLookupCacMap();
      const rows = contentRowsForCampaign(source, campaign).map(row => classifyContentAction(row, campaignStats));
      return { rows, cols: ['action','content', ...metricCols], highlightContent: true, source, campaign };
    }

    function renderSourceControls() {
      const box = document.getElementById('sourceControls');
      if (state.tab === 'source_summary') {
        box.innerHTML = `
          <button class="${state.summaryView === 'summary' ? 'active' : ''}" data-summary-view="summary">Source Summary</button>
          <button class="${state.summaryView === 'source_risk' ? 'active' : ''}" data-summary-view="source_risk">Source Risk</button>
        `;
        return;
      }
      if (state.tab === 'google') {
        if (!state.googleView || (state.googleView !== 'summary' && !state.googleView.startsWith('campaign:'))) state.googleView = 'summary';
        const pmaxCampaigns = campaignsForSource('google_pmax');
        const demandgenCampaigns = campaignsForSource('google_demandgen');
        const pmaxButtons = pmaxCampaigns.map(row => {
          const view = 'campaign:google_pmax:' + row.campaign;
          return '<button class="' + (state.googleView === view ? 'active' : '') + '" data-google-view="' + view + '">' + row.campaign + ' / ' + fmt(row.lookups, 'lookups') + '</button>';
        }).join('');
        const demandgenButtons = demandgenCampaigns.map(row => {
          const view = 'campaign:google_demandgen:' + row.campaign;
          return '<button class="' + (state.googleView === view ? 'active' : '') + '" data-google-view="' + view + '">' + row.campaign + ' / ' + fmt(row.lookups, 'lookups') + '</button>';
        }).join('');
        box.innerHTML = `
          <button class="${state.googleView === 'summary' ? 'active' : ''}" data-google-view="summary">Google Total</button>
          ${pmaxButtons}
          ${demandgenButtons}
        `;
        return;
      }
      if (!state.tab.startsWith('source:')) {
        box.innerHTML = '';
        return;
      }
      const source = state.tab.replace('source:', '');
      const campaigns = campaignsForSource(source);
      if (!state.activeCampaign[source]) state.activeCampaign[source] = '__total';
      const totalButton = `<button class="${state.activeCampaign[source] === '__total' ? 'active' : ''}" data-campaign="__total">Campaign Total</button>`;
      box.innerHTML = totalButton + campaigns.map(row => `
        <button class="${state.activeCampaign[source] === row.campaign ? 'active' : ''}" data-campaign="${row.campaign}">
          ${row.campaign} · ${fmt(row.lookups, 'lookups')}
        </button>
      `).join('');
    }

    function renderTabs() {
      document.getElementById('tabs').innerHTML = detailTabs().map(([key, label]) => {
        const styleAttr = key === 'action_guide' ? ' style="margin-left:auto;"' : '';
        return `<button class="${state.tab === key ? 'active' : ''}" data-tab="${key}"${styleAttr}>${label}</button>`;
      }).join('');
    }

    function renderTable() {
      renderTabs();
      renderSourceControls();
      const config = currentTableConfig();
      let rows = config.rows;
      if (!state.sortKey || !config.cols.includes(state.sortKey)) state.sortKey = config.defaultSort || 'lookups';
      rows = [...rows].sort((a, b) => {
        const av = Number(a[state.sortKey]);
        const bv = Number(b[state.sortKey]);
        if (Number.isFinite(av) && Number.isFinite(bv)) return (av - bv) * state.sortDir;
        return String(a[state.sortKey] ?? '').localeCompare(String(b[state.sortKey] ?? '')) * state.sortDir;
      });
      const comment = document.getElementById('campaignComment');
      let bestContent = null;
      let avgLookupCac = 0;
      if (config.highlightContent && rows.length) {
        bestContent = rows.reduce((best, row) => n(row.lookups) > n(best.lookups) ? row : best, rows[0]);
        const totalLookups = rows.reduce((sum, row) => sum + n(row.lookups), 0);
        const totalSpend = rows.reduce((sum, row) => sum + n(row.spend), 0);
        const bestLookupShare = totalLookups ? n(bestContent.lookups) / totalLookups : 0;
        avgLookupCac = totalLookups ? totalSpend / totalLookups : 0;
        const highCacCount = rows.filter(row => avgLookupCac && n(row.lookup_cac) >= avgLookupCac * 1.5).length;
        const risk = campaignContentRisk(config.source, config.campaign);
        const topHighCac = risk.highCacRows[0];
        const detailLabel = config.source === 'google_pmax' ? 'term' : 'content';
        const bestName = config.source === 'google_pmax' ? (bestContent.term || bestContent.content) : bestContent.content;
        const topHighCacName = topHighCac ? (config.source === 'google_pmax' ? (topHighCac.term || topHighCac.content) : topHighCac.content) : '';
        const riskLines = [];
        if (risk.zeroRows.length) riskLines.push(`광고비가 발생했지만 조회가 없는 ${detailLabel} ${risk.zeroRows.length}개`);
        if (risk.highCacRows.length) riskLines.push(`campaign 평균 조회CAC 대비 1.5배 이상 높은 ${detailLabel} ${risk.highCacRows.length}개${topHighCac ? ` (최고: "${topHighCacName}" / ${fmt(topHighCac.lookup_cac, 'lookup_cac')})` : ''}`);
        if (!riskLines.length) riskLines.push(`감지된 ${detailLabel} risk는 없습니다.`);
        comment.style.display = 'block';
        comment.innerHTML = `
          <strong>${config.campaign} 성과 요약</strong>
          <ul style="margin:8px 0 0 18px; padding:0;">
            <li>campaign 평균 조회CAC: ${fmt(avgLookupCac, 'lookup_cac')}</li>
            <li>조회수 최상위 ${detailLabel}: "${bestName}" (${fmt(bestContent.lookups, 'lookups')}, 당일 총 조회 대비 ${fmt(bestLookupShare, 'lookup_rate')})</li>
            <li>평균 조회CAC 대비 1.5배 이상 높은 ${detailLabel}: ${highCacCount}개</li>
          </ul>
          <strong style="display:block; margin-top:10px;">risk 감지</strong>
          <ul style="margin:8px 0 0 18px; padding:0;">
            ${riskLines.map(line => `<li>${line}</li>`).join('')}
          </ul>`;
      } else {
        comment.style.display = 'none';
        comment.innerHTML = '';
      }
      let body = '';
      if (config.expandable) {
        body = rows.map(row => {
          const parent = `<tr class="source-parent" data-source="${row.source}" style="cursor:pointer;">${config.cols.map((col, index) => `<td class="${colClass(col)}">${index === 0 ? (state.expandedSource === row.source ? '▼ ' : '▶ ') : ''}${fmt(row[col], col)}</td>`).join('')}</tr>`;
          if (state.expandedSource !== row.source) return parent;
          const daily = dailyRowsForSource(row.source);
          const children = daily.map(day => {
            const isToday = day.date.slice(0, 10) === DATA.metadata.basis_date;
            return `<tr class="${isToday ? 'today-row' : ''}" style="${isToday ? '' : 'background:#f8fbfd;'}">${config.cols.map((col, index) => {
            if (index === 0) return `<td class="${colClass(col)}">　${day.date.slice(0, 10)}</td>`;
            return `<td class="${colClass(col)}">${fmt(day[col], col)}</td>`;
          }).join('')}</tr>`;
          }).join('');
          return parent + children;
        }).join('');
      } else {
        body = rows.map(row => {
          let rowClass = '';
          if (config.highlightContent) {
            if (row.action_key === 'scale') rowClass = 'action-scale';
            else if (row.action_key === 'pause') rowClass = 'action-pause';
            else if (row.action_key === 'refresh') rowClass = 'action-refresh';
            else if (row.action_key === 'conversion') rowClass = 'action-conversion';
          } else if (config.actionList) {
            if (row.action_key === 'scale') rowClass = 'action-scale';
            else if (row.action_key === 'pause') rowClass = 'action-pause';
            else if (row.action_key === 'refresh') rowClass = 'action-refresh';
            else if (row.action_key === 'conversion') rowClass = 'action-conversion';
          } else if (config.googleAnalysis) {
            if (row.row_type === 'Source Total') rowClass = 'today-row';
          } else if (config.sourceRisk) {
            if (row.severity === '긴급') rowClass = 'risk-critical';
            else if (row.severity === '높음') rowClass = 'risk-high';
            else if (row.severity === '주의') rowClass = 'risk-medium';
            else if (row.severity === '개선') rowClass = 'best-row';
          }
          return `<tr class="${rowClass}">${config.cols.map(col => `<td class="${colClass(col)}">${fmt(row[col], col)}</td>`).join('')}</tr>`;
        }).join('');
        if (!body) body = `<tr><td colspan="${config.cols.length}" style="text-align:left;">자동 탐지된 위험 항목이 없습니다.</td></tr>`;
      }
      document.getElementById('dataTable').innerHTML = `
        <thead><tr>${config.cols.map(col => `<th class="${colClass(col)}" data-col="${col}">${headerText(col)}</th>`).join('')}</tr></thead>
        <tbody>${body}</tbody>`;
    }

    function renderNotes() {
      document.getElementById('notes').innerHTML = DATA.metadata.notes.map(note => `<div>${note}</div>`).join('');
    }

    function renderConversionTabs() {
      const views = DATA.metadata.conversion_views || [{ key: 'db', label: 'DB 기준' }];
      document.getElementById('conversionTabs').innerHTML = `
        <span>전환 데이터 기준</span>
        ${views.map(view => `<button class="${state.conversionView === view.key ? 'active' : ''}" data-conversion-view="${view.key}">${view.label}</button>`).join('')}
      `;
    }

    function renderAll() {
      renderConversionTabs();
      document.getElementById('basisChip').textContent = DATA.metadata.basis_date;
      document.getElementById('updateChip').textContent = DATA.metadata.update_label;
      document.getElementById('recentChip').textContent = `${DATA.metadata.recent_7_start}~${DATA.metadata.recent_7_end}`;
      document.getElementById('sourceChip').textContent = DATA.metadata.media_sources.join(', ');
      renderKpis();
      renderKeySummary();
      renderCompareChart();
      renderTrendChart();
      renderNotes();
      renderTable();
    }

    document.getElementById('tabs').addEventListener('click', e => {
      const button = e.target.closest('button[data-tab]');
      if (!button) return;
      state.tab = button.dataset.tab;
      state.sortKey = null;
      state.sortDir = -1;
      state.expandedSource = null;
      renderTable();
    });
    document.getElementById('conversionTabs').addEventListener('click', e => {
      const button = e.target.closest('button[data-conversion-view]');
      if (!button) return;
      state.conversionView = button.dataset.conversionView;
      state.tab = 'source_summary';
      state.summaryView = 'summary';
      state.expandedSource = null;
      state.sortKey = 'lookups';
      state.sortDir = -1;
      state.trendSource = '합계';
      renderAll();
    });
    document.getElementById('sourceControls').addEventListener('click', e => {
      const summaryButton = e.target.closest('button[data-summary-view]');
      if (summaryButton) {
        state.summaryView = summaryButton.dataset.summaryView;
        state.sortKey = null;
        state.sortDir = -1;
        state.expandedSource = null;
        renderTable();
        return;
      }
      const googleButton = e.target.closest('button[data-google-view]');
      if (googleButton) {
        state.googleView = googleButton.dataset.googleView;
        state.sortKey = null;
        state.sortDir = -1;
        renderTable();
        return;
      }
      const button = e.target.closest('button[data-campaign]');
      if (!button) return;
      const source = state.tab.replace('source:', '');
      state.activeCampaign[source] = button.dataset.campaign;
      state.sortKey = 'lookups';
      state.sortDir = -1;
      renderTable();
    });
    document.getElementById('trendButtons').addEventListener('click', e => {
      const button = e.target.closest('button[data-trend]');
      if (!button) return;
      state.trendSource = button.dataset.trend;
      renderTrendChart();
    });
    document.getElementById('dataTable').addEventListener('click', e => {
      const th = e.target.closest('th[data-col]');
      if (!th) {
        const row = e.target.closest('tr.source-parent');
        if (row) {
          state.expandedSource = state.expandedSource === row.dataset.source ? null : row.dataset.source;
          renderTable();
        }
        return;
      }
      state.sortDir = state.sortKey === th.dataset.col ? state.sortDir * -1 : -1;
      state.sortKey = th.dataset.col;
      renderTable();
    });

    renderAll();
  </script>
</body>
</html>
